<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Объявление — Tuyona.tj</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/cards.css">
</head>
<body>

<nav class="nav" id="main-nav"></nav>

<div class="container" style="padding-top:48px;padding-bottom:80px">
  <a href="categories.html" style="display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-bottom:32px;transition:color 0.2s" onmouseover="this.style.color='var(--gold-d)'" onmouseout="this.style.color='var(--muted)'">← Назад к категориям</a>

  <div id="listing-content">
    <div class="spinner" style="margin:80px auto"></div>
  </div>
</div>

<footer class="footer" id="main-footer"></footer>

<script type="module">
  import { renderNav, renderFooter } from './js/nav.js';
  import { DEMO_LISTINGS, getCatName } from './js/listings.js';

  renderNav('cats');
  renderFooter();

  const id = new URLSearchParams(location.search).get('id');
  const listing = DEMO_LISTINGS.find(l => l.id === id) || DEMO_LISTINGS[0];

  const icons = { rest:'🍽️', music:'🎻', singer:'🎤', photo:'📸', decor:'🌸', salon:'👗', car:'🚗', mc:'🎙️' };
  const icon = icons[listing.category] || '⭐';

  document.title = `${listing.name} — Tuyona.tj`;

  document.getElementById('listing-content').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr auto;gap:40px;align-items:start;margin-bottom:32px">
      <div>
        <h1 class="heading-lg" style="margin-bottom:12px">${listing.name}</h1>
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap">
          <span style="font-size:13px;color:var(--muted)">${getCatName(listing.category)}</span>
          ${listing.verified ? `<span class="badge badge-sage">✓ Проверено</span>` : ''}
          <span style="font-family:var(--serif);font-size:18px;font-weight:700;color:var(--dark)">${listing.price || 'Договорная'}</span>
        </div>
        <p style="font-size:15px;color:var(--muted);line-height:1.8;margin-bottom:24px;max-width:560px">${listing.description || ''}</p>
        <button onclick="navigator.share ? navigator.share({title:'${listing.name}',url:location.href}) : navigator.clipboard.writeText(location.href)" class="btn btn-primary">Поделиться</button>
      </div>
      <div style="background:linear-gradient(135deg,#3A3530,#5A4E46);border-radius:20px;padding:32px;width:200px;height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;flex-shrink:0">
        <div style="font-size:52px">${icon}</div>
        <div style="font-family:var(--serif);font-size:14px;font-weight:700;color:var(--gold);text-align:center;text-transform:uppercase">${listing.name}</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:32px;background:var(--white)">
      <div style="padding:18px 20px;border-right:1px solid var(--border)">
        <div style="font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">⏰ Часы</div>
        <div style="font-size:14px;color:var(--dark);font-weight:500">${listing.hours || '—'}</div>
      </div>
      <div style="padding:18px 20px;border-right:1px solid var(--border)">
        <div style="font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">📍 Адрес</div>
        <div style="font-size:14px;color:var(--gold-d);font-weight:500">${listing.address || listing.city || '—'}</div>
      </div>
      <div style="padding:18px 20px;border-right:1px solid var(--border)">
        <div style="font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">📞 Телефон</div>
        <div style="font-size:14px;font-weight:500"><a href="tel:${listing.phone}" style="color:var(--gold-d)">${listing.phone || '—'}</a></div>
      </div>
      <div style="padding:18px 20px">
        <div style="font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">🔗 Соцсети</div>
        <div style="font-size:14px;color:var(--text);font-weight:500">${listing.social || '—'}</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto;gap:12px">
      <div style="grid-row:1/3;background:linear-gradient(135deg,#3A3530,#5A4E46);border-radius:16px;min-height:320px;display:flex;align-items:center;justify-content:center;font-size:80px">${icon}</div>
      ${[1,2,3,4].map(()=>`
        <div style="background:var(--bg);border-radius:12px;height:154px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid var(--border);position:relative">
          <span style="font-size:28px;opacity:0.3">🎬</span>
          <div style="position:absolute;bottom:10px;right:10px;width:28px;height:28px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">▶</div>
          <div style="position:absolute;top:8px;left:10px;font-size:11px;color:var(--muted)">Видео</div>
        </div>`).join('')}
    </div>`;
</script>
</body>
</html>
